name: Generate profile summary cards (PR to protected main)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Generate WORK cards into the action's default output folder.
      - name: Generate WORK cards (no push)
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: mthurman-sumer
          UTC_OFFSET: 0
          AUTO_PUSH: false

      - name: Move WORK cards into repo folder
        run: |
          rm -rf profile-cards/work
          mkdir -p profile-cards/work
          cp -R profile-summary-card-output/* profile-cards/work/

      # Generate PERSONAL cards (same default output folder).
      - name: Generate PERSONAL cards (no push)
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: jmichaelthurman
          UTC_OFFSET: 0
          AUTO_PUSH: false

      - name: Move PERSONAL cards into repo folder
        run: |
          rm -rf profile-cards/personal
          mkdir -p profile-cards/personal
          cp -R profile-summary-card-output/* profile-cards/personal/

      - name: Create/update PR branch with generated cards
        env:
          BRANCH: automation/profile-cards
        run: |
          git checkout -B "$BRANCH"
          git add profile-cards
          git commit -m "chore: update profile cards" || echo "No changes to commit"
          git push --force-with-lease origin "$BRANCH"

      - name: Open or update PR to main
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = "automation/profile-cards";
            const base = "main";
            const title = "chore: update profile cards";
            const body = "Automated update of profile summary cards.";

            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: "open", head: `${owner}:${head}`
            });

            if (prs.length > 0) {
              core.info(`PR already open: #${prs[0].number}`);
              await github.rest.pulls.update({
                owner, repo, pull_number: prs[0].number, title, body
              });
            } else {
              const pr = await github.rest.pulls.create({
                owner, repo, head, base, title, body
              });
              core.info(`Created PR: ${pr.data.html_url}`);
            }
            
